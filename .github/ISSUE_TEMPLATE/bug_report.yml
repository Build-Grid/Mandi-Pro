name: 🐛 Bug Report
description: Report a bug to help us improve the application
title: "[BUG] "
labels: ["type: bug"]
assignees: []

body:
    - type: markdown
      attributes:
          value: |
              ## 🐞 Bug Report
              Thanks for reporting a bug! Please fill out the details below.

    - type: textarea
      id: description
      attributes:
          label: 📌 Description
          description: Clearly describe the bug
          placeholder: What happened? What went wrong?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: 🔁 Steps to Reproduce
          description: How can we reproduce this issue?
          placeholder: |
              1. Go to...
              2. Click on...
              3. Observe error...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: ✅ Expected Behavior
          description: What did you expect to happen?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: ❌ Actual Behavior
          description: What actually happened?
      validations:
          required: true

    - type: dropdown
      id: area
      attributes:
          label: 🧩 Affected Area
          description: Which part of the system is affected?
          options:
              - Frontend
              - Backend
              - API Integration
              - CI/CD
              - Database
              - Other
      validations:
          required: true

    - type: dropdown
      id: severity
      attributes:
          label: 🚨 Severity
          description: How critical is this issue?
          options:
              - Low (minor issue)
              - Medium (affects usability)
              - High (blocks functionality)
              - Critical (system broken / data loss)
      validations:
          required: true

    - type: input
      id: environment
      attributes:
          label: 💻 Environment
          description: Provide environment details
          placeholder: e.g. Chrome 122, Node 20, Java 21, Windows 11

    - type: textarea
      id: logs
      attributes:
          label: 📄 Logs / Error Messages
          description: Paste any relevant logs or stack traces
          render: shell

    - type: textarea
      id: screenshots
      attributes:
          label: 📷 Screenshots (Optional)
          description: Drag and drop images here if applicable

    - type: checkboxes
      id: terms
      attributes:
          label: ✅ Checklist
          description: Please confirm the following
          options:
              - label: I have searched existing issues
                required: true
              - label: I have provided all necessary details
                required: true
