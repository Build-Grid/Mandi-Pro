name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["type: feature"]
assignees: []

body:
    - type: markdown
      attributes:
          value: |
              ## 🚀 Feature Request
              Have an idea to improve the project? Fill out the details below.

    - type: textarea
      id: problem
      attributes:
          label: ❗ Problem Statement
          description: What problem does this feature solve?
          placeholder: Describe the pain point or limitation you're facing
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: 💡 Proposed Solution
          description: Describe your proposed solution
          placeholder: How should this feature work?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: 🔄 Alternatives Considered
          description: Any alternative solutions or features you considered?
          placeholder: Describe any alternative approaches

    - type: dropdown
      id: area
      attributes:
          label: 🧩 Affected Area
          description: Which part of the system does this relate to?
          options:
              - Frontend
              - Backend
              - API Integration
              - CI/CD
              - Database
              - DevOps
              - Other
      validations:
          required: true

    - type: dropdown
      id: priority
      attributes:
          label: ⚡ Priority
          description: How important is this feature?
          options:
              - Low (nice to have)
              - Medium (improves experience)
              - High (important feature)
              - Critical (must have)
      validations:
          required: true

    - type: textarea
      id: usecase
      attributes:
          label: 🎯 Use Case
          description: Describe how users will use this feature
          placeholder: Explain real-world usage

    - type: textarea
      id: additional
      attributes:
          label: 📌 Additional Context
          description: Add any other context, screenshots, or references

    - type: checkboxes
      id: checklist
      attributes:
          label: ✅ Checklist
          description: Please confirm before submitting
          options:
              - label: I have searched for existing feature requests
                required: true
              - label: This is not a duplicate request
                required: true
