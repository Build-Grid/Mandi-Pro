name: ⚛️ Frontend CI

on:
    push:
        paths:
            - "frontend/**"
    pull_request:
        paths:
            - "frontend/**"

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: 🟢 Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: 📦 Install Dependencies
              run: npm ci

            - name: 🧪 Run Tests
              run: npm test -- --watchAll=false

            - name: 🏗 Build
              run: npm run build
