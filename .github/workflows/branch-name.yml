name: 🌿 Branch Name Check

on:
    pull_request:

jobs:
    branch-name:
        runs-on: ubuntu-latest

        steps:
            - name: Validate branch name
              run: |
                  BRANCH="${{ github.head_ref }}"

                  if [[ ! "$BRANCH" =~ ^(backend|frontend|devops|database)/(feature|bug|chore|refactor|improvement|documentation)/[a-z0-9-]+$ ]]; then
                    echo "❌ Invalid branch name: $BRANCH"
                    exit 1
                  fi

                  echo "✅ Valid branch name"
