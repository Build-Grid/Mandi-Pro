# ===================================================================
# HIBERNATE & JPA CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===================================================================
# FLYWAY DATABASE MIGRATION
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# ===================================================================
# LOGGING & ERROR HANDLING
# ===================================================================
logging.level.root=INFO
logging.level.com.buildgrid.mandipro=INFO
server.error.include-stacktrace=never
server.error.include-message=never

# ===================================================================
# OPENAPI / SWAGGER DOCUMENTATION
# ===================================================================
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# ===================================================================
# DATA SOURCE & HIKARI CONNECTION POOL
# ===================================================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# ===================================================================
# COOKIE CONFIGURATION (PRODUCTION)
# ===================================================================
app.cookie.http-only=${APP_COOKIE_HTTP_ONLY:true}
app.cookie.secure=${APP_COOKIE_SECURE:true}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:None}
app.cookie.domain=${APP_COOKIE_DOMAIN:}
app.cookie.path=${APP_COOKIE_PATH:/}

# ===================================================================
# PASSWORD RESET CONFIGURATION
# ===================================================================
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:https://app.mandipro.com/reset-password}

# ===================================================================
# FIRM INVITE CONFIGURATION
# ===================================================================
app.invite.accept-base-url=${INVITE_ACCEPT_BASE_URL:https://app.mandipro.com/accept-invite}

