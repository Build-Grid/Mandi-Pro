# ===================================================================
# APPLICATION CORE CONFIGURATION
# ===================================================================
spring.profiles.active=${SPRING_PROFILE:dev}
spring.application.name=${APP_NAME:MandiPro}
spring.main.allow-bean-definition-overriding=true

# ===================================================================
# DATABASE CONNECTION (MYSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mandipro?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE & JPA CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# FLYWAY DATABASE MIGRATION
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.flyway.schemas=mandipro-db

# ===================================================================
# ACTUATOR & MONITORING
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ===================================================================
# COOKIE CONFIGURATION (OVERRIDDEN PER PROFILE)
# ===================================================================
app.cookie.http-only=${APP_COOKIE_HTTP_ONLY:true}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Strict}
app.cookie.domain=${APP_COOKIE_DOMAIN:}
app.cookie.path=${APP_COOKIE_PATH:/}

