# ===================================================================
# APPLICATION CORE CONFIGURATION
# ===================================================================
spring.profiles.active=${SPRING_PROFILE:dev}
spring.application.name=${APP_NAME:MandiPro}
spring.main.allow-bean-definition-overriding=true

# ===================================================================
# DATABASE CONNECTION (MYSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mandipro?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE & JPA CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# FLYWAY DATABASE MIGRATION
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.flyway.schemas=mandipro-db

# ===================================================================
# ACTUATOR & MONITORING
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ===================================================================
# COOKIE CONFIGURATION (OVERRIDDEN PER PROFILE)
# ===================================================================
app.cookie.http-only=${APP_COOKIE_HTTP_ONLY:true}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Strict}
app.cookie.domain=${APP_COOKIE_DOMAIN:}
app.cookie.path=${APP_COOKIE_PATH:/}

# ===================================================================
# MAIL CONFIGURATION
# ===================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@mandipro.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# PASSWORD RESET CONFIGURATION
# ===================================================================
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:15}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}

# ===================================================================
# FIRM INVITE CONFIGURATION
# ===================================================================
app.invite.expiry-hours=${INVITE_EXPIRY_HOURS:48}
app.invite.accept-base-url=${INVITE_ACCEPT_BASE_URL:https://app.mandipro.com/accept-invite}
