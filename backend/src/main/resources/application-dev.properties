# ===================================================================
# HIBERNATE & JPA CONFIGURATION (DEVELOPMENT)
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===================================================================
# FLYWAY DATABASE MIGRATION (DEVELOPMENT)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
logging.level.com.buildgrid.mandipro=DEBUG

# ===================================================================
# OPENAPI / SWAGGER DOCUMENTATION
# ===================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===================================================================
# DATA SOURCE & HIKARI CONNECTION POOL
# ===================================================================
spring.datasource.hikari.maximum-pool-size=5

# ===================================================================
# COOKIE CONFIGURATION (DEVELOPMENT)
# ===================================================================
app.cookie.http-only=${APP_COOKIE_HTTP_ONLY:true}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}
app.cookie.domain=${APP_COOKIE_DOMAIN:}
app.cookie.path=${APP_COOKIE_PATH:/}

